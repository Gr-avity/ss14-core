- type: entity
  id: ChemDispenserEmpty
  name: chemical dispenser 5000
  suffix: Empty
  parent: ReagentDispenserBase
  description: An industrial grade chemical dispenser.
  components:
  - type: Sprite
    sprite: Structures/dispensers.rsi
    # Starlight-start: Chem Dispenser unpowered/wiring panel states
    layers:
      - state: industrial-off
      - state: industrial-working
        visible: false
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
      - state: industrial-panel
        map: ["enum.WiresVisualLayers.MaintenancePanel"]
        visible: false
    snapCardinals: false # Starlight-edit: allow non-cardinal rotation for chem dispenser to avoid conflict with 4 direction plumbing connector sprites
    # Starlight-end
  - type: Storage
    openOnActivate: false
    whitelist:
      tags:
      - ChemDispensable
  - type: ApcPowerReceiver
  - type: ExtensionCableReceiver
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ChangeConstructionNodeBehavior
        node: machineFrame
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Machine
    board: ChemDispenserMachineCircuitboard
  - type: GuideHelp
    guides:
    - Chemicals
    - Chemist
  - type: StealTarget
    stealGroup: ChemDispenser
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25, -0.4, 0.25, 0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer

- type: entity
  id: ChemDispenser
  suffix: Filled
  parent: ChemDispenserEmpty
  components:
  # SS14-Art edit start
  - type: ReagentDispenser
    dispensedReagents:
    - Nitrogen
    - Aluminium
    - Bromine
    - Water
    - Hydrogen
    - Iron
    - Iodine
    - Potassium
    - Oxygen
    - Silicon
    - Lithium
    - Copper
    - Sodium
    - Plasma
    - Radium
    - Mercury
    - Sugar
    - Sulfur
    - Silver
    - Carbon
    - Phosphorus
    - Fluorine
    - Chlorine
    - Chromium
    - Ethanol
  # SS14-Art edit end
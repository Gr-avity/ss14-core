# ss14-art-edit start: Lunarix patron ghost themes
- type: ghostTheme
  id: angel
  name: ghost-theme-angel-name
  description: ghost-theme-angel-desc
  spriteSpecifier:
    sprite:
      sprite: _Starlight/Mobs/Customization/GhostThemes/angel.rsi
      state: angel
    color: "#ffffff"
  trail:
    color: "#FFFFFF"
    maxPoints: 40
    lineWidth: 2.6
    minDistance: 0.10
    decayDelay: 2.6
    decayInterval: 0.15
    shader: HolyStarsTrail
  requirements:
  - !type:DiscordRolesRequirement
    requirement: MoonKnightGhostThemeReq

